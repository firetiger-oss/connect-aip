version: v2

# Generates a Python fixture for the protoc-gen-aip-py regression test. Run this
# whenever test.proto changes:
#   go install ./cmd/protoc-gen-aip-py
#   cd internal/testproto && PATH=$HOME/go/bin:$PATH buf generate --template buf.gen.py.yaml

managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/googleapis/googleapis

inputs:
  - directory: .

plugins:
  - remote: buf.build/protocolbuffers/python:v28.3
    out: testpy

  - local: protoc-gen-aip-py
    out: testpy
