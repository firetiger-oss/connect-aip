name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]

jobs:

  test:
    runs-on: ubuntu-latest

    env:
      GOPRIVATE: github.com/firetiger-oss/*

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Until firetiger-oss/connect-sse goes public, fetching it from go.mod
      # requires a token with read access to private firetiger-oss repos. Set
      # FIRETIGER_OSS_PAT (Settings → Secrets and variables → Actions → New
      # repository secret) to a fine-grained PAT scoped to the firetiger-oss
      # org with "Contents: Read-only" on connect-sse.
      - name: Configure git for private firetiger-oss modules
        env:
          FIRETIGER_OSS_PAT: ${{ secrets.FIRETIGER_OSS_PAT }}
        run: |
          if [ -n "$FIRETIGER_OSS_PAT" ]; then
            git config --global url."https://x-access-token:${FIRETIGER_OSS_PAT}@github.com/firetiger-oss/".insteadOf "https://github.com/firetiger-oss/"
          else
            echo "::warning::FIRETIGER_OSS_PAT secret not set; private firetiger-oss/* go.mod fetches will fail until it is configured."
          fi

      - name: fmt
        run: test -z $(gofmt -l . | head -n 1) || ( gofmt -d . ; exit 1 )

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: install plugins
        run: go install ./cmd/...

      - name: test
        run: go test -race ./...

      - uses: dominikh/staticcheck-action@v1
        with:
          version: '2025.1.1'
          install-go: false

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: install
        working-directory: python
        run: uv sync --all-extras

      - name: test
        working-directory: python
        run: uv run pytest
