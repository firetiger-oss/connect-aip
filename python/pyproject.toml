[project]
name = "connectaip"
version = "0.0.1"
description = "Python runtime for AIP-shaped REST endpoints generated by protoc-gen-aip-py"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Firetiger" },
]
requires-python = ">=3.10"
keywords = ["protobuf", "connect", "rpc", "rest", "aip", "google-aip", "codegen"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Code Generators",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
    "connect-python>=0.5",
    "protobuf>=5.0",
]

[project.urls]
Homepage = "https://github.com/firetiger-oss/connect-aip"
Repository = "https://github.com/firetiger-oss/connect-aip"
Issues = "https://github.com/firetiger-oss/connect-aip/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/connectaip"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
