[project]
name = "connectaip"
version = "0.0.1"
description = "Python runtime for AIP-shaped REST endpoints generated by protoc-gen-aip-py"
readme = "../README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "connect-python>=0.5",
    "protobuf>=5.0",
]

[project.urls]
Homepage = "https://github.com/firetiger-oss/connect-aip"
Repository = "https://github.com/firetiger-oss/connect-aip"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/connectaip"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
